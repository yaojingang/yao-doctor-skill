<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yao Doctor Skill Security Report</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-alt: #fafafa;
      --surface-soft: #f5f7fa;
      --line: #e5e7eb;
      --line-strong: #d0d7de;
      --ink: #111827;
      --muted: #667085;
      --critical: #c1121f;
      --unsafe: #e76f51;
      --suspicious: #e9a820;
      --risky: #2563eb;
      --safe: #2f855a;
      --shadow: 0 18px 48px rgba(15, 23, 42, 0.06);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --nav-height: 72px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "SF Pro Text", "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      height: var(--nav-height);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      width: min(1380px, calc(100vw - 40px));
      height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-weight: 700;
      letter-spacing: -0.04em;
      background: linear-gradient(180deg, #ffffff, #f4f7fb);
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu-link,
    .lang-toggle {
      height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--muted);
      transition: border-color 180ms ease, color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .menu-link:hover,
    .menu-link.is-current,
    .lang-toggle:hover {
      color: var(--ink);
      background: var(--surface-soft);
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .lang-toggle {
      cursor: pointer;
      font-weight: 600;
      color: var(--ink);
    }

    .page {
      width: min(1380px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(320px, 0.8fr);
      gap: 22px;
      align-items: stretch;
      margin-bottom: 24px;
    }

    .hero-main,
    .hero-side,
    .section,
    .module-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .hero-main {
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .hero-main::after {
      content: "";
      position: absolute;
      inset: auto -8% -24% auto;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.08), transparent 72%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-title {
      margin: 18px 0 12px;
      font-family: "Iowan Old Style", "Songti SC", "Georgia", serif;
      font-size: clamp(42px, 7vw, 72px);
      line-height: 0.96;
      letter-spacing: -0.045em;
      max-width: 11ch;
    }

    .hero-summary {
      margin: 0;
      max-width: 62ch;
      font-size: 15px;
      line-height: 1.8;
      color: var(--muted);
    }

    .hero-meta-grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .hero-meta {
      padding: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: var(--surface-alt);
    }

    .hero-meta label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .hero-meta strong {
      display: block;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    .hero-side {
      padding: 24px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .hero-side-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 14px;
    }

    .hero-side-title {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .chip-list,
    .root-list,
    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip,
    .quick-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-alt);
      font-size: 13px;
      color: var(--muted);
    }

    .quick-link:hover {
      border-color: var(--line-strong);
      color: var(--ink);
      background: var(--surface-soft);
    }

    .root-pill {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--surface-alt);
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      word-break: break-all;
    }

    .section {
      padding: 24px;
      margin-top: 24px;
      scroll-margin-top: calc(var(--nav-height) + 18px);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 18px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.035em;
      font-family: "Iowan Old Style", "Songti SC", "Georgia", serif;
    }

    .section-head p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 66ch;
      line-height: 1.75;
      font-size: 14px;
    }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-card {
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: var(--surface-alt);
    }

    .summary-card label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .summary-card strong {
      display: block;
      font-size: clamp(28px, 4vw, 40px);
      letter-spacing: -0.05em;
      margin-bottom: 8px;
    }

    .summary-card span {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .analysis-type-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .analysis-type-card {
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: #ffffff;
      cursor: pointer;
      transition: border-color 180ms ease, background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }

    .analysis-type-card:hover {
      border-color: var(--line-strong);
      background: var(--surface-soft);
      transform: translateY(-1px);
    }

    .analysis-type-card.is-active {
      border-color: var(--ink);
      background: var(--surface-soft);
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.08);
    }

    .analysis-type-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 14px;
      margin-bottom: 12px;
    }

    .analysis-type-head h3 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.02em;
      font-family: "Iowan Old Style", "Songti SC", "Georgia", serif;
    }

    .analysis-type-head p {
      margin: 8px 0 0;
      font-size: 13px;
      line-height: 1.75;
      color: var(--muted);
    }

    .analysis-type-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: end;
    }

    .analysis-type-pill {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .analysis-note {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px dashed var(--line-strong);
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.75;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .chart-card,
    .guide-card,
    .metric-card {
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: var(--surface-alt);
    }

    .chart-card h3,
    .guide-card h3,
    .metric-card h3 {
      margin: 0 0 8px;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .chart-card p,
    .guide-card p,
    .metric-card p {
      margin: 0 0 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .definition-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .levels {
      display: grid;
      gap: 10px;
    }

    .level-row {
      display: grid;
      gap: 6px;
    }

    .level-row.is-filter-target,
    .bar-row.is-filter-target {
      padding: 8px 10px;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      cursor: pointer;
      transition: border-color 180ms ease, background 180ms ease, transform 180ms ease, opacity 180ms ease;
    }

    .level-row.is-filter-target:hover,
    .bar-row.is-filter-target:hover {
      border-color: var(--line-strong);
      background: #ffffff;
      transform: translateY(-1px);
    }

    .level-row.is-filter-target.is-active,
    .bar-row.is-filter-target.is-active {
      border-color: var(--ink);
      background: var(--surface-soft);
    }

    .level-row.is-muted,
    .bar-row.is-muted,
    .chart-row.is-muted {
      opacity: 0.34;
    }

    .level-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .level-bar,
    .mini-bar-track {
      height: 10px;
      border-radius: 999px;
      background: #edf1f5;
      overflow: hidden;
    }

    .level-fill,
    .mini-bar-fill {
      height: 100%;
      border-radius: inherit;
    }

    .matrix {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .matrix-cell {
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: #ffffff;
    }

    .matrix-cell strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .matrix-cell span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .steps {
      display: grid;
      gap: 10px;
    }

    .step-item {
      position: relative;
      padding: 14px 16px 14px 48px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: #ffffff;
    }

    .step-item::before {
      content: attr(data-step);
      position: absolute;
      left: 14px;
      top: 14px;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--ink);
      color: #ffffff;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 700;
    }

    .step-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .step-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .skills-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .toolbar-stack {
      display: grid;
      gap: 10px;
      min-width: min(100%, 780px);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-btn {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #ffffff;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 180ms ease, background 180ms ease, color 180ms ease;
    }

    .filter-btn.is-active {
      border-color: var(--ink);
      color: var(--ink);
      background: var(--surface-soft);
    }

    .module-grid {
      display: grid;
      gap: 18px;
    }

    .module-card {
      padding: 22px;
      scroll-margin-top: calc(var(--nav-height) + 18px);
    }

    .module-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 18px;
      margin-bottom: 16px;
    }

    .module-title {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.03em;
      font-family: "Iowan Old Style", "Songti SC", "Georgia", serif;
    }

    .module-subtitle,
    .module-path {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      word-break: break-all;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: end;
    }

    .badge {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-alt);
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .badge.status-critical { color: var(--critical); border-color: rgba(193, 18, 31, 0.24); background: rgba(193, 18, 31, 0.06); }
    .badge.status-unsafe { color: var(--unsafe); border-color: rgba(231, 111, 81, 0.26); background: rgba(231, 111, 81, 0.08); }
    .badge.status-suspicious { color: var(--suspicious); border-color: rgba(233, 168, 32, 0.26); background: rgba(233, 168, 32, 0.1); }
    .badge.status-risky { color: var(--risky); border-color: rgba(37, 99, 235, 0.22); background: rgba(37, 99, 235, 0.06); }
    .badge.status-safe { color: var(--safe); border-color: rgba(47, 133, 90, 0.22); background: rgba(47, 133, 90, 0.08); }

    .module-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .meta-card {
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--surface-alt);
    }

    .meta-card label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .meta-card strong {
      display: block;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    .module-chart-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }

    .module-chart {
      padding: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: var(--surface-alt);
    }

    .module-chart h4 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .module-chart p {
      margin: 0 0 12px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    .audit-card {
      margin-bottom: 16px;
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .audit-card.status-critical {
      border-color: rgba(193, 18, 31, 0.2);
      background: linear-gradient(180deg, rgba(193, 18, 31, 0.05), #ffffff 42%);
    }

    .audit-card.status-unsafe {
      border-color: rgba(231, 111, 81, 0.2);
      background: linear-gradient(180deg, rgba(231, 111, 81, 0.05), #ffffff 42%);
    }

    .audit-card.status-suspicious {
      border-color: rgba(233, 168, 32, 0.2);
      background: linear-gradient(180deg, rgba(233, 168, 32, 0.06), #ffffff 42%);
    }

    .audit-card.status-risky {
      border-color: rgba(37, 99, 235, 0.18);
      background: linear-gradient(180deg, rgba(37, 99, 235, 0.05), #ffffff 42%);
    }

    .audit-card.status-safe {
      border-color: rgba(47, 133, 90, 0.18);
      background: linear-gradient(180deg, rgba(47, 133, 90, 0.05), #ffffff 42%);
    }

    .audit-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 18px;
    }

    .audit-kicker {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .audit-head h4 {
      margin: 12px 0 8px;
      font-size: 22px;
      letter-spacing: -0.03em;
      font-family: "Iowan Old Style", "Songti SC", "Georgia", serif;
    }

    .audit-head p {
      margin: 0;
      max-width: 64ch;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .audit-pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: end;
    }

    .audit-pill {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .audit-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 14px;
    }

    .audit-panel {
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
    }

    .audit-panel h5 {
      margin: 0 0 10px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .audit-panel p {
      margin: 0;
      font-size: 13px;
      line-height: 1.8;
      color: var(--ink);
    }

    .audit-secondary {
      margin-top: 10px !important;
      color: var(--muted) !important;
    }

    .audit-focus {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .audit-focus-chip {
      min-height: 32px;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .audit-steps {
      display: grid;
      gap: 10px;
    }

    .audit-step {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .audit-step span {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;

    function normalize(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function currentCopy() {
      return i18n[state.lang];

    function translate(group, key) {
      const table = labelMaps[group] && labelMaps[group][state.lang];
      return table && table[key] ? table[key] : key;
    }

    function getSummaryItems(skills = null) {
      if (skills) {
        return getSummaryItemsForSkills(skills);

      return dispositionOrder.map((key) => ({

    function getGradientFromSummary(skills = null) {
      const items = getSummaryItems(skills);
      const total = items.reduce((sum, item) => sum + item.count, 0) || 1;
      let cursor = 0;
      return items
        .map((item) => {
          const start = cursor;
          const size = (item.count / total) * 100;
          const end = cursor + size;
          cursor = end;
          return `${colorMap[item.key]} ${start}% ${end}%`;
        })
        .join(", ");
    }

    function getTopUnsafeSkills(limit = 8) {
      return [...payload.skills]
        .sort((a, b) => b.unsafe_behavior_score - a.unsafe_behavior_score)
        .slice(0, limit);
    }

    function hasActiveTypeFilter() {
      return state.typeFilter !== "all";
    }

    function getSkillsForType(type = state.typeFilter) {
      if (type === "all") {
        return payload.skills;
      }
      return payload.skills.filter((skill) => classifySkillType(skill) === type);
    }

    function getOverviewSkills() {
      return getSkillsForType();
    }

    function getSummaryItemsForSkills(skills) {
      const summary = dispositionOrder.reduce((acc, key) => {
        acc[key] = 0;
        return acc;
      }, {});
      skills.forEach((skill) => {
        summary[skill.disposition] += 1;
      });
      return dispositionOrder.map((key) => ({
        key,
        count: summary[key] || 0
      }));
    }

    function currentTypeLabel(copy) {
      return state.typeFilter === "all" ? copy.analysis.all : translate("skillType", state.typeFilter);
    }

    function getFocusSkills(limit = 10) {
      return getFilteredSkills().filter((item) => ["critical", "unsafe", "suspicious"].includes(item.disposition)).slice(0, limit);
    }

    function getFilteredSkills() {
      return payload.skills.filter((item) => {
        const dispositionMatch = state.filter === "all" ? true : item.disposition === state.filter;
        const typeMatch = state.typeFilter === "all" ? true : classifySkillType(item) === state.typeFilter;
        return dispositionMatch && typeMatch;
      });
    }

    function skillAnchor(index) {
      return `skill-${index}`;
    }

    function severityCounts(skill) {
      const base = { critical: 0, high: 0, medium: 0, low: 0 };
      (skill.findings || []).forEach((item) => {
        if (base[item.severity] !== undefined) {
          base[item.severity] += 1;
        }
      });
      return base;
    }

    function naturalJoin(items) {
      const list = (items || []).filter(Boolean);
      if (!list.length) {
        return "";
      }
      if (state.lang === "zh") {
        return list.join("、");
      }
      if (list.length === 1) {
        return list[0];
      }
      if (list.length === 2) {
        return `${list[0]} and ${list[1]}`;
      }
      return `${list.slice(0, -1).join(", ")}, and ${list[list.length - 1]}`;
    }

    function topFindingLabels(skill, limit = 3) {
      return [...new Set((skill.findings || []).map((item) => translate("category", item.category)))].slice(0, limit);
    }

    function topCapabilityLabels(skill, limit = 3) {
      return [...new Set((skill.top_capabilities || []).map((item) => translate("category", item.category)))].slice(0, limit);
    }

    function getLastModifiedAgeDays(skill) {
      if (!skill.last_modified_utc) {
        return null;
      }
      const value = Date.parse(skill.last_modified_utc);
      if (!Number.isFinite(value)) {
        return null;
      }
      const diff = Math.floor((Date.now() - value) / 86400000);
      return Math.max(0, diff);
    }

    function classifySkillType(skill) {
      const capabilities = new Set((skill.top_capabilities || []).map((item) => item.category));
      const findings = new Set((skill.findings || []).map((item) => item.category));
      if (
        skill.target_kind === "workbench" ||
        (skill.protected_surface_count || 0) >= 8 ||
        ["prompt-boundary-bypass", "persistence-abuse", "remote-exec"].some((item) => findings.has(item)) ||
        ["automation", "persistence"].some((item) => capabilities.has(item))
      ) {
        return "control-plane";
      }
      if (
        capabilities.has("network-egress") ||
        ["external-sink", "credentialed-egress", "bounded-credentialed-egress", "shortlink-download"].some((item) => findings.has(item))
      ) {
        return "external-integration";
      }
      if (["filesystem-read", "filesystem-write", "env-access", "command-execution", "remote-install"].some((item) => capabilities.has(item))) {
        return "local-operator";
      }
      return "instructional";
    }

    function buildAnalysisGroups() {
      const order = ["control-plane", "external-integration", "local-operator", "instructional"];
      return order.map((type) => {
        const skills = payload.skills.filter((skill) => classifySkillType(skill) === type);
        const count = skills.length;
        const dispositionCounts = dispositionOrder.reduce((acc, key) => {
          acc[key] = 0;
          return acc;
        }, {});
        skills.forEach((skill) => {
          dispositionCounts[skill.disposition] += 1;
        });
        const ages = skills.map((skill) => getLastModifiedAgeDays(skill)).filter((value) => value !== null);
        const recent30 = ages.filter((value) => value <= 30).length;
        const protectedCount = skills.filter((skill) => (skill.protected_surface_count || 0) > 0).length;
        const average = (items, picker) => items.length ? items.reduce((sum, item) => sum + picker(item), 0) / items.length : 0;
        const capabilityLabels = [...new Set(skills.flatMap((skill) => (skill.top_capabilities || []).map((item) => translate("category", item.category))))].slice(0, 3);
        const findingLabels = [...new Set(skills.flatMap((skill) => (skill.findings || []).map((item) => translate("category", item.category))))].slice(0, 3);
        return {
          type,
          skills,
          count,
          share: payload.skill_count ? (count / payload.skill_count) * 100 : 0,
          averageCapability: average(skills, (skill) => skill.capability_risk_score),
          averageUnsafe: average(skills, (skill) => skill.unsafe_behavior_score),
          averageFiles: average(skills, (skill) => skill.file_count),
          recent30,
          recent30Ratio: count ? (recent30 / count) * 100 : 0,
          protectedRatio: count ? (protectedCount / count) * 100 : 0,
          dispositionCounts,
          topCapabilities: capabilityLabels,
          topFindings: findingLabels
        };
      });
    }

          ${includeDisclaimer ? `<div class="evidence-disclaimer">${normalize(copy.skills.panels.disclaimer)}</div>` : ""}
        </div>
      `;
    }

    function buildFindingsAssessment(skill) {
      const findings = skill.findings || [];
      const labels = topFindingLabels(skill);
      const labelText = naturalJoin(labels);
      const highSeverityCount = findings.filter((item) => ["high", "critical"].includes(item.severity)).length;
      if (!findings.length) {
        return state.lang === "zh"
          ? {
              summary: "当前模块没有展示高置信不安全证据。就这份报告而言，它更像是能力面存在，但暂时没有形成明确的敏感数据外传、隐蔽执行或持久化滥用链路。",
              recommendation: "可以把重点放在用途核对和后续变更观察上。如果它后面新增联网、命令执行、依赖安装或敏感文件访问能力，建议重新扫描并结合代码再复核一次。"
            }
          : {
              summary: "No high-confidence unsafe evidence is currently shown for this module. In this report it looks more like exposed capability surface than a confirmed chain of exfiltration, stealthy execution, or persistence abuse.",

      }

      if (skill.disposition === "critical") {
        return state.lang === "zh"
          ? {
              summary: `当前主要证据集中在${labelText || "高风险行为"}，而且高危信号已经足以把结论提升到“严重”。这类结果通常不只是“权限大”，而是代码里已经出现了敏感来源、外部出口或执行链路之间的强关联。`,
              recommendation: "建议先不要直接启用或执行。优先查看对应代码、外部请求、命令执行路径和真实用途，确认这些行为是否确属业务设计；如果用途不清晰，建议先隔离审查。"
            }
          : {
              summary: `The primary evidence is concentrated around ${labelText || "high-risk behaviors"}, and the high-severity signals are strong enough to raise the module to Critical. This usually means more than broad permissions: the code already shows strong linkage between sensitive sources, external sinks, or execution paths.`,
              recommendation: "Do not enable or run it directly yet. Review the code, outbound requests, execution path, and intended purpose first; if the purpose is unclear, keep it isolated until reviewed."
            };
      }

      if (skill.disposition === "unsafe") {
        return state.lang === "zh"
          ? {
              summary: `当前证据重点落在${labelText || "危险行为"}，并且已经形成较强的不安全信号。它未必已经证实为恶意，但已经超出“普通高权限工具”的范畴，值得按高风险模块处理。`,
              recommendation: "建议默认先阻止执行，再结合具体代码和用途判断它是否属于预期设计。尤其要核对这些行为是否真的需要触达敏感数据、联网出口或远程执行。"
            }
          : {
              summary: `The evidence is centered on ${labelText || "dangerous behaviors"} and already forms a strong unsafe signal. It is not automatically proven malicious, but it is beyond the boundary of a merely high-permission tool and should be treated as high risk.`,
              recommendation: "Block execution by default first, then confirm whether the behavior is actually intended by reviewing the code and intended use. Pay special attention to sensitive data access, outbound sinks, and remote execution paths."
            };
      }

      if (skill.disposition === "suspicious") {
        return state.lang === "zh"
          ? {
              summary: `当前模块出现了${labelText || "异常信号"}等证据，说明它确实有值得警惕的地方，但上下文和真实用途仍可能影响最终判断。它更像“需要继续看代码”的模块，而不是已经坐实的问题。`,
              recommendation: "建议继续人工复核，重点确认这些行为是不是产品设计的一部分，还是超出预期的隐藏能力。尤其是高严重度条目，最好顺着文件、行号和上下游调用再看一层。"
            }
          : {
              summary: `The module shows evidence such as ${labelText || "abnormal signals"}, which is enough to justify concern, but context and real purpose can still change the final judgment. It is better treated as a “needs deeper code review” module than a confirmed issue.`,
              recommendation: "Continue with manual review and verify whether the behavior is part of the intended design or an unexpected hidden capability. For higher-severity items, follow the file path, line, and surrounding call chain before deciding."
            };
      }

      return state.lang === "zh"
        ? {
            summary: `当前可见证据主要落在${labelText || "局部风险信号"}，共出现 ${findings.length} 条主要证据，其中高严重度 ${highSeverityCount} 条。它更像是在提醒你这里存在风险面或异常边角，还不能直接等同于恶意行为。`,
            recommendation: "建议结合使用场景看代码和说明文档，确认这些信号是不是合理设计的一部分。如果这个模块会接触真实数据，最好再核对外部请求、命令执行和权限边界是否都属于业务刚需。"
          }
        : {
            summary: `The visible evidence is mainly concentrated around ${labelText || "localized risk signals"}, with ${findings.length} primary items and ${highSeverityCount} high-severity items. This is better read as a warning about risk surface or edge-case anomalies, not immediate proof of malicious behavior.`,
            recommendation: "Review the code and documentation in the context of your actual use case. If the module will touch real data, confirm that outbound requests, execution paths, and permissions are all genuinely required."
          };
    }

    function buildCapabilityAssessment(skill) {
      const labels = topCapabilityLabels(skill);
      const labelText = naturalJoin(labels);
      if (!(skill.top_capabilities || []).length) {
        return state.lang === "zh"
          ? {
              summary: "当前没有明显能力面命中，说明它在静态结构上没有暴露出大范围的读写、执行或联网能力。",
              recommendation: "可以先按低攻击面模块处理，但如果后续新增脚本、配置或外部集成，仍建议重新扫描。"
            }
          : {
              summary: "No clear capability surface was detected. Structurally, the module does not currently expose broad read/write, execution, or network capability.",
              recommendation: "Treat it as a lower-attack-surface module for now, but rescan it when new scripts, configs, or integrations are added."
            };
      }

      const highCapability = skill.capability_risk_score >= 70;
      if (highCapability) {
        return state.lang === "zh"
          ? {
              summary: `能力证据主要集中在${labelText || "高权限能力"}，能力风险分为 ${skill.capability_risk_score}。这说明它具备较广的攻击面，但“具备能力”并不等于“已经不安全”，仍要和真实用途一起看。`,
              recommendation: "如果你准备实际使用它，建议优先确认这些能力是否都是业务必须，并尽量收缩目录范围、网络出口和凭据权限。对于高能力面模块，最小权限和隔离边界比一次性打分更重要。"
            }
          : {
              summary: `Capability evidence is mainly concentrated around ${labelText || "high-permission capabilities"}, with a capability score of ${skill.capability_risk_score}. This means the module has a broad attack surface, but broad capability alone is still not the same as confirmed unsafe behavior.`,
              recommendation: "If you plan to use it, first verify that these capabilities are genuinely required, then tighten directory scope, network boundaries, and credential privileges. For broad-surface modules, least privilege matters more than a single score."
            };
      }

      return state.lang === "zh"
        ? {
            summary: `能力证据主要落在${labelText || "少量能力面"}，能力风险分为 ${skill.capability_risk_score}。这说明它有一定操作面，但边界相对可控，后续更需要结合用途判断这些能力是否合理。`,
            recommendation: "建议记录它为什么需要这些能力、会访问哪些数据、依赖哪些外部服务。只要用途和边界说得清楚，这类能力面通常是可管理的。"
          }
        : {
            summary: `Capability evidence is mainly concentrated around ${labelText || "a limited set of capabilities"}, with a capability score of ${skill.capability_risk_score}. This indicates some operational surface, but the boundary is still comparatively manageable.`,
            recommendation: "Document why these capabilities are needed, what data they touch, and which external services they depend on. When purpose and boundaries are explicit, this kind of capability surface is usually manageable."
          };
    }

    function uniqueProtectedSurfaceLabels(skill, limit = 2) {
      const seen = new Set();
      const labels = [];
      const push = (surface) => {
        if (!surface || seen.has(surface)) {
          return;
        }
        seen.add(surface);
        labels.push(translate("protectedSurface", surface));
      };
      (skill.findings || []).forEach((finding) => push(finding.protected_surface));
      (skill.top_capabilities || []).forEach((item) => push(item.evidence && item.evidence.protected_surface));
      return labels.slice(0, limit);
    }

    function buildAuditSteps(skill) {
      const findingText = naturalJoin(topFindingLabels(skill, 2));
      const capabilityText = naturalJoin(topCapabilityLabels(skill, 2));
      if (state.lang === "zh") {
        if (skill.disposition === "critical") {
          return [
            "先按隔离对象处理，暂时不要直接启用、执行或安装它的自动化流程。",
            `优先查看 ${findingText || "高风险链路"} 对应的代码、外发目标和真实用途，确认这些行为是否确属业务设计。`,
            `如果后续仍需要使用，先收缩 ${capabilityText || "高权限能力"} 的目录范围、网络出口和凭据边界，再重新扫描。`
          ];
        }
        if (skill.disposition === "unsafe") {
          return [
            "默认先阻止执行，避免它在未复核前接触真实数据或生产环境。",
            `检查 ${findingText || "主要证据"} 是否真的业务必需，尤其要看外发、执行、持久化和凭据相关路径。`,
            "只有在代码、用途和边界都解释得通时，再考虑把它放回受控环境里试运行。"
          ];
        }
        if (skill.disposition === "suspicious") {
          return [
            "先把它放在人工复核队列，不要因为一条命中就直接判恶意，也不要在没看代码前直接放行。",
            `重点核对 ${findingText || "这些可疑点"} 和真实功能描述是否一致，确认是否只是工程脚本、示例或受控集成。`,
            "如果准备试用，建议先限制网络、目录和凭据范围，并在复核后再重新扫描一次。"
          ];
        }
        if (skill.disposition === "risky") {
          return [
            "把它按高能力面模块管理，不要把“能做很多事”和“已经不安全”混为一谈。",
            `确认 ${capabilityText || "这些能力"} 是否都是业务必须，并把可访问目录、命令和外部服务写清楚。`,
            "后续一旦新增联网、依赖安装、命令执行或敏感数据访问，建议重新扫描并做一次代码复核。"
          ];
        }
        return [
          "当前可以先按低风险模块看待，但结论仍然依赖真实用途和运行环境。",
          "保持最小权限，避免给它额外的目录、凭据或联网能力。",
          "如果后续有明显变更，尤其是脚本、工作流或外部集成变化，建议再跑一轮扫描。"
        ];
      }

      if (skill.disposition === "critical") {
        return [
          "Treat it as an isolation candidate first; do not enable, execute, or install its automation flow yet.",
          `Review the code, outbound targets, and intended purpose behind ${findingText || "the high-risk chain"} before trusting it.`,
          `If it still needs to be used, tighten the directory scope, network egress, and credential boundary around ${capabilityText || "its broad capabilities"} and rescan afterward.`
        ];
      }
      if (skill.disposition === "unsafe") {
        return [
          "Block it by default until the code and purpose have been reviewed against real usage.",
          `Verify whether ${findingText || "the main evidence"} is actually required, especially around outbound access, execution, persistence, and credentials.`,
          "Only consider a controlled trial after the code path, purpose, and boundaries all make sense together."
        ];
      }
      if (skill.disposition === "suspicious") {
        return [
          "Put it into a manual review queue. One hit alone is not proof of maliciousness, but it is also not something to wave through blindly.",
          `Check whether ${findingText || "the suspicious signals"} matches the claimed purpose or is just an engineering script, example, or bounded integration.`,
          "If you need to trial it, first restrict network, file, and credential scope, then rescan after review."
        ];
      }
      if (skill.disposition === "risky") {
        return [
          "Manage it as a broad-capability module rather than assuming it is already malicious.",
          `Confirm that ${capabilityText || "these capabilities"} are genuinely necessary and document the directories, commands, and external services it can touch.`,
          "Rescan it when new network access, dependency installs, command execution, or sensitive data access is added."
        ];
      }
      return [
        "Treat it as lower risk for now, but keep the decision tied to the real environment and use case.",
        "Preserve least privilege and avoid granting extra directories, credentials, or network access without a reason.",
        "If its scripts, workflows, or integrations change later, run another scan."
      ];
    }

    function buildAuditOpinion(skill, copy) {
      const findingsAssessment = buildFindingsAssessment(skill);
      const capabilityAssessment = buildCapabilityAssessment(skill);
      const focus = [];
      const findingLabels = topFindingLabels(skill, 2);
      const capabilityLabels = topCapabilityLabels(skill, 2);
      const protectedSurfaces = uniqueProtectedSurfaceLabels(skill, 2);
      const changedCount = (skill.diff_summary && skill.diff_summary.changed_count) || 0;

      if (findingLabels.length) {
        focus.push(`${copy.skills.audit.primaryRisks} · ${naturalJoin(findingLabels)}`);
      }
      if (capabilityLabels.length) {
        focus.push(`${copy.skills.audit.capabilitySurface} · ${naturalJoin(capabilityLabels)}`);
      }
      if (protectedSurfaces.length) {
        focus.push(`${copy.skills.audit.protectedSurface} · ${naturalJoin(protectedSurfaces)}`);
      }
      if (changedCount > 0) {
        focus.push(`${copy.skills.audit.changeScope} · ${changedCount}`);
      } else {
        focus.push(`${copy.skills.fields.scanMode} · ${translate("scanMode", skill.scan_mode || "fresh")}`);
      }

      if (state.lang === "zh") {
        if (skill.disposition === "critical") {
          return {
            headline: "建议先隔离，再做代码与用途复核",
            stance: "当前结果已经超出普通高权限工具的范畴，更接近需要立即收紧边界的高风险对象。",
            objective: findingsAssessment.summary,
            capabilityContext: capabilityAssessment.summary,
            steps: buildAuditSteps(skill),
            focus
          };
        }
        if (skill.disposition === "unsafe") {
          return {
            headline: "建议默认阻止执行，核清用途后再决定",
            stance: "这类结果通常意味着不安全信号已经比较强，不能只按“功能脚本”来理解。",
            objective: findingsAssessment.summary,
            capabilityContext: capabilityAssessment.summary,
            steps: buildAuditSteps(skill),
            focus
          };
        }
        if (skill.disposition === "suspicious") {
          return {
            headline: "建议人工复核后，再决定是否启用",
            stance: "当前更像存在需要解释的异常点，而不是已经确认恶意；关键在于继续核对真实用途。",
            objective: findingsAssessment.summary,
            capabilityContext: capabilityAssessment.summary,
            steps: buildAuditSteps(skill),
            focus
          };
        }
        if (skill.disposition === "risky") {
          return {
            headline: "建议按高能力面模块管理，不要直接等同恶意",
            stance: "当前更像攻击面偏大但用途未必异常的模块，重点是边界治理，而不是直接定性。",
            objective: findingsAssessment.summary,
            capabilityContext: capabilityAssessment.summary,
            steps: buildAuditSteps(skill),
            focus
          };
        }
        return {
          headline: "当前未见高危证据，建议持续观察与最小权限",
          stance: "这份结果更接近“暂时没有强危险信号”，而不是永久安全承诺。",
          objective: findingsAssessment.summary,
          capabilityContext: capabilityAssessment.summary,
          steps: buildAuditSteps(skill),
          focus
        };
      }

      if (skill.disposition === "critical") {
        return {
          headline: "Isolate First, Then Review Code And Purpose",
          stance: "This result is beyond an ordinary broad-permission tool and should be treated as a high-risk object with tightened boundaries immediately.",
          objective: findingsAssessment.summary,
          capabilityContext: capabilityAssessment.summary,
          steps: buildAuditSteps(skill),
          focus
        };
      }
      if (skill.disposition === "unsafe") {
        return {
          headline: "Block By Default Until The Purpose Is Cleared",
          stance: "The unsafe signals are already strong enough that this should not be treated as just another functional script.",
          objective: findingsAssessment.summary,
          capabilityContext: capabilityAssessment.summary,
          steps: buildAuditSteps(skill),
          focus
        };
      }
      if (skill.disposition === "suspicious") {
        return {
          headline: "Review Manually Before Deciding To Enable It",
          stance: "This looks more like an anomaly that still needs explanation than a confirmed malicious module, but it should not be auto-approved either.",
          objective: findingsAssessment.summary,
          capabilityContext: capabilityAssessment.summary,
          steps: buildAuditSteps(skill),
          focus
        };
      }
      if (skill.disposition === "risky") {
        return {
          headline: "Manage It As A Broad-Surface Module, Not Proven Malware",
          stance: "The bigger issue here is governance of the exposed capability surface, not automatic proof of malicious intent.",
          objective: findingsAssessment.summary,
          capabilityContext: capabilityAssessment.summary,
          steps: buildAuditSteps(skill),
          focus
        };
      }
      return {
        headline: "No High-Risk Evidence Shown, But Keep Least Privilege",
        stance: "This is closer to an absence of strong danger signals than a permanent guarantee of safety.",
        objective: findingsAssessment.summary,
        capabilityContext: capabilityAssessment.summary,
        steps: buildAuditSteps(skill),
        focus
      };
    }

    function renderAuditOpinionCard(skill, copy) {
      const opinion = buildAuditOpinion(skill, copy);
      return `
        <section class="audit-card status-${skill.disposition}">
          <div class="audit-head">
            <div>
              <span class="audit-kicker">${normalize(copy.skills.audit.title)}</span>

              <p>${normalize(opinion.stance)}</p>

      document.getElementById("brand-subtitle").textContent = copy.brandSubtitle;

      document.getElementById("hero-eyebrow").textContent = copy.hero.eyebrow;
      document.getElementById("hero-title").textContent = copy.hero.title;
      document.getElementById("hero-summary").textContent = copy.hero.summary;

    function renderSummaryCards(copy) {
      const summaryItems = getSummaryItems(getOverviewSkills());
      document.getElementById("summary-cards").innerHTML = copy.overview.cards.map(([label, count, desc], index) => {
        const key = dispositionOrder[index] || "safe";

    function renderDistributionChart(copy) {
      const skills = getOverviewSkills();
      const summaryItems = getSummaryItems(skills);
      const total = summaryItems.reduce((sum, item) => sum + item.count, 0) || 1;
      const legend = summaryItems.map((item) => `

              <div style="width:112px;height:112px;border-radius:999px;background:#fff;display:grid;place-items:center;border:1px solid var(--line);">
                <div style="text-align:center;">
                  <strong style="display:block;font-size:30px;letter-spacing:-0.05em;">${skills.length}</strong>
                  <span style="font-size:12px;color:var(--muted);">${normalize(hasActiveTypeFilter() ? currentTypeLabel(copy) : copy.hero.meta[2][0])}</span>
