    function renderTopUnsafeChart(copy) {
      const rows = [...getOverviewSkills()]
        .sort((a, b) => b.unsafe_behavior_score - a.unsafe_behavior_score)
        .slice(0, 8)
        .map((skill, index) => `
        <div class="chart-row">
          <strong>
            <span>${index + 1}. ${normalize(skill.declared_name)}</span>
            <span>${skill.unsafe_behavior_score}</span>
          </strong>
          <div class="mini-bar-track">
            <div class="mini-bar-fill" style="width:${skill.unsafe_behavior_score}%;background:${colorMap[skill.disposition]};"></div>
          </div>
        </div>
      `).join("");
      return `
        <div class="chart-card">
          <h3>${normalize(copy.overview.charts.topUnsafe)}</h3>
          <p>${normalize(copy.overview.charts.topUnsafeDesc)}</p>
          <div class="chart-table">${rows}</div>
        </div>
      `;
    }

    function renderScatterChart(copy) {
      const width = 420;
      const height = 280;
      const padding = 34;
      const dots = payload.skills.map((skill, index) => {
        const x = padding + ((width - padding * 2) * skill.capability_risk_score) / 100;
        const y = height - padding - ((height - padding * 2) * skill.unsafe_behavior_score) / 100;
        const isActive = !hasActiveTypeFilter() || classifySkillType(skill) === state.typeFilter;
        const r = hasActiveTypeFilter() ? (isActive ? 5.2 : 2.9) : (index < 8 ? 5.5 : 4);
        const fillOpacity = hasActiveTypeFilter() ? (isActive ? 0.88 : 0.12) : (index < 8 ? 0.88 : 0.56);
        const stroke = hasActiveTypeFilter() && isActive ? "#0f172a" : "none";
        const strokeWidth = hasActiveTypeFilter() && isActive ? 0.9 : 0;
        return `<circle cx="${x}" cy="${y}" r="${r}" fill="${colorMap[skill.disposition]}" fill-opacity="${fillOpacity}" stroke="${stroke}" stroke-width="${strokeWidth}">
          <title>${normalize(skill.declared_name)} | capability ${skill.capability_risk_score} | unsafe ${skill.unsafe_behavior_score}</title>
        </circle>`;
      }).join("");
      const guideLines = [25, 50, 75].map((value) => {
        const x = padding + ((width - padding * 2) * value) / 100;
        const y = height - padding - ((height - padding * 2) * value) / 100;
        return `
          <line x1="${x}" y1="${padding}" x2="${x}" y2="${height - padding}" stroke="#e5e7eb" stroke-dasharray="4 6"></line>
          <line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#e5e7eb" stroke-dasharray="4 6"></line>
        `;
      }).join("");
      const legend = dispositionOrder.map((key) => `
        <span class="legend-chip">
          <span class="dot" style="background:${colorMap[key]};"></span>
          ${normalize(translate("disposition", key))}
        </span>
      `).join("");
      return `
        <div class="chart-card">
          <h3>${normalize(copy.overview.charts.quadrant)}</h3>
          <p>${normalize(copy.overview.charts.quadrantDesc)}</p>
          <div class="scatter-wrap">
            <svg class="scatter-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="${normalize(copy.overview.charts.quadrant)}">
              <rect x="0" y="0" width="${width}" height="${height}" fill="#ffffff"></rect>
              ${guideLines}
              <line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#98a2b3"></line>
              <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height - padding}" stroke="#98a2b3"></line>
              <text x="${width / 2}" y="${height - 8}" text-anchor="middle" font-size="11" fill="#667085">${normalize(copy.definitions.cards[0][0])}</text>
              <text x="14" y="${height / 2}" text-anchor="middle" font-size="11" fill="#667085" transform="rotate(-90 14 ${height / 2})">${normalize(copy.definitions.cards[1][0])}</text>
              ${dots}
            </svg>
          </div>
          <div class="chart-legend">${legend}</div>
        </div>
      `;
    }

    function renderOverview(copy) {
      document.getElementById("overview-title").textContent = copy.overview.title;
      document.getElementById("overview-desc").textContent = hasActiveTypeFilter()
        ? (state.lang === "zh"
            ? `${copy.overview.desc} 当前已切换到“${currentTypeLabel(copy)}”视角，分布和最高风险模块会按该类型联动更新。`
            : `${copy.overview.desc} The overview is currently focused on ${currentTypeLabel(copy)}, so the distribution and top-risk modules are updated for that type.`)
        : copy.overview.desc;
      renderSummaryCards(copy);
      document.getElementById("overview-chart-grid").innerHTML = [
        renderDistributionChart(copy),
        renderTopUnsafeChart(copy),
        renderScatterChart(copy)
      ].join("");
    }

    function dominantDispositionLabels(group, limit = 2) {
      return dispositionOrder
        .map((key) => ({ key, count: group.dispositionCounts[key] || 0 }))
        .filter((item) => item.count > 0)
        .sort((a, b) => b.count - a.count)
        .slice(0, limit)
        .map((item) => `${translate("disposition", item.key)} ${item.count}`);
    }

    function renderTypeDistributionChart(copy, groups) {
      const maxCount = Math.max(...groups.map((group) => group.count), 1);
      return `
        <div class="chart-card">
          <h3>${normalize(copy.analysis.charts.distribution)}</h3>
          <p>${normalize(copy.analysis.charts.distributionDesc)}</p>
          <div class="chart-table">
            ${groups.map((group) => `
              <div class="chart-row is-filter-target ${state.typeFilter === group.type ? "is-active" : ""}" data-type-filter="${group.type}" role="button" tabindex="0" aria-pressed="${state.typeFilter === group.type ? "true" : "false"}">
                <strong>
                  <span>${normalize(translate("skillType", group.type))}</span>
                  <span>${group.count} · ${Math.round(group.share)}%</span>
                </strong>
                <div class="mini-bar-track">
                  <div class="mini-bar-fill" style="width:${Math.max(14, (group.count / maxCount) * 100)}%;background:${group.type === "control-plane" ? "var(--critical)" : group.type === "external-integration" ? "var(--unsafe)" : group.type === "local-operator" ? "var(--risky)" : "var(--safe)"};"></div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderTypeRiskMixChart(copy, groups) {
      const legend = dispositionOrder.map((key) => `
        <span class="legend-chip">
          <span class="dot" style="background:${colorMap[key]};"></span>
          ${normalize(translate("disposition", key))}
        </span>
      `).join("");
      return `
        <div class="chart-card">
          <h3>${normalize(copy.analysis.charts.riskMix)}</h3>
          <p>${normalize(copy.analysis.charts.riskMixDesc)}</p>
          <div class="severity-stack">
            ${groups.map((group) => `
              <div class="bar-row is-filter-target ${state.typeFilter === group.type ? "is-active" : ""} ${hasActiveTypeFilter() && state.typeFilter !== group.type ? "is-muted" : ""}" data-type-filter="${group.type}" role="button" tabindex="0" aria-pressed="${state.typeFilter === group.type ? "true" : "false"}">
                <div class="bar-head">
                  <span>${normalize(translate("skillType", group.type))}</span>
                  <span>${naturalJoin(dominantDispositionLabels(group))}</span>
                </div>
                <div class="stack-track">
                  ${dispositionOrder.map((key) => {
                    const value = group.count ? ((group.dispositionCounts[key] || 0) / group.count) * 100 : 0;
                    return `<div class="stack-segment" style="width:${value}%;background:${colorMap[key]};"></div>`;
                  }).join("")}
                </div>
              </div>
            `).join("")}
          </div>
          <div class="chart-legend">${legend}</div>
        </div>
      `;
    }

    function renderTypeActivityChart(copy, groups) {
      return `
        <div class="chart-card">
          <h3>${normalize(copy.analysis.charts.activity)}</h3>
          <p>${normalize(copy.analysis.charts.activityDesc)}</p>
          <div class="levels">
            ${groups.map((group) => `
              <div class="level-row is-filter-target ${state.typeFilter === group.type ? "is-active" : ""} ${hasActiveTypeFilter() && state.typeFilter !== group.type ? "is-muted" : ""}" data-type-filter="${group.type}" role="button" tabindex="0" aria-pressed="${state.typeFilter === group.type ? "true" : "false"}">
                <div class="level-meta">
                  <span>${normalize(translate("skillType", group.type))}</span>
                  <span>${Math.round(group.recent30Ratio)}% / ${Math.round(group.averageCapability)} / ${Math.round(group.averageUnsafe)}</span>
                </div>
                <div class="levels" style="gap:8px;">
                  <div class="level-row">
                    <div class="level-meta">
                      <span>${normalize(copy.analysis.metrics.activity)}</span>
                      <span>${Math.round(group.recent30Ratio)}%</span>
                    </div>
                    <div class="level-bar"><div class="level-fill" style="width:${group.recent30Ratio}%;background:var(--safe);"></div></div>
                  </div>
                  <div class="level-row">
                    <div class="level-meta">
                      <span>${normalize(copy.analysis.metrics.avgCapability)}</span>
                      <span>${Math.round(group.averageCapability)}</span>
                    </div>
                    <div class="level-bar"><div class="level-fill" style="width:${group.averageCapability}%;background:var(--risky);"></div></div>
                  </div>
                  <div class="level-row">
                    <div class="level-meta">
                      <span>${normalize(copy.analysis.metrics.avgUnsafe)}</span>
                      <span>${Math.round(group.averageUnsafe)}</span>
                    </div>
                    <div class="level-bar"><div class="level-fill" style="width:${group.averageUnsafe}%;background:var(--unsafe);"></div></div>
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function describeTypeCharacteristics(group, copy) {
      const caps = naturalJoin(group.topCapabilities);
      const findings = naturalJoin(group.topFindings);
      if (state.lang === "zh") {
        if (caps && findings) {
          return `能力面主要集中在 ${caps}，风险侧更常见的是 ${findings}。这说明这一类更需要同时看“能做什么”和“是否真的越界”。`;
        }
        if (caps) {
          return `能力面主要集中在 ${caps}，这类模块通常更接近具体工具、脚本或执行入口。`;
        }
        if (findings) {
          return `当前更显眼的是 ${findings} 这类风险信号，说明它们的风险表达更多来自说明面或行为线索，而不是广能力面。`;
        }
        return "这一类当前没有明显的共同高风险特征，更像是执行面较轻或边界较窄的模块集合。";
      }
      if (caps && findings) {
        return `Capability surface is mainly concentrated around ${caps}, while the risk side shows up more often as ${findings}. This type should be read through both what it can do and whether it actually crosses a boundary.`;
      }
      if (caps) {
        return `Capability surface is mainly concentrated around ${caps}, so this type behaves more like concrete tooling, scripts, or execution entry points.`;
      }
      if (findings) {
        return `The more visible signals here are ${findings}, which means the risk pattern is coming more from instruction or behavior cues than from a broad executable surface.`;
      }
      return "This type does not currently show a strong shared high-risk signature and is closer to a lighter-weight or narrower-boundary module set.";
    }

    function describeTypeUsageSignal(group, copy) {
      if (state.lang === "zh") {
        return `近 30 天活跃率约为 ${Math.round(group.recent30Ratio)}%（${group.recent30}/${group.count}）。这里把最近修改时间当作使用频率代理，所以它更像“近期活跃度”，不是实际调用次数。`;
      }
      return `The recent-30-day activity proxy is about ${Math.round(group.recent30Ratio)}% (${group.recent30}/${group.count}). This uses modification recency as a usage signal, so read it as activity heat rather than literal invocation count.`;
    }

    function renderAnalysisTypeCard(group, copy) {
      const typeCopy = copy.analysis.types[group.type];
      return `
        <div class="analysis-type-card ${state.typeFilter === group.type ? "is-active" : ""}" data-type-filter="${group.type}" role="button" tabindex="0" aria-pressed="${state.typeFilter === group.type ? "true" : "false"}">
          <div class="analysis-type-head">
            <div>
              <h3>${normalize(typeCopy.title)}</h3>
              <p>${normalize(typeCopy.desc)}</p>
            </div>
            <div class="analysis-type-pills">
              <span class="analysis-type-pill">${normalize(copy.analysis.metrics.count)} · ${group.count}</span>
              <span class="analysis-type-pill">${normalize(copy.analysis.metrics.share)} · ${Math.round(group.share)}%</span>
            </div>
          </div>
          <div class="levels">
            <div class="level-row">
              <div class="level-meta">
                <span>${normalize(copy.analysis.metrics.activity)}</span>
                <span>${Math.round(group.recent30Ratio)}%</span>
              </div>
              <div class="level-bar"><div class="level-fill" style="width:${group.recent30Ratio}%;background:var(--safe);"></div></div>
            </div>
            <div class="level-row">
              <div class="level-meta">
                <span>${normalize(copy.analysis.metrics.avgCapability)}</span>
                <span>${Math.round(group.averageCapability)}</span>
              </div>
              <div class="level-bar"><div class="level-fill" style="width:${group.averageCapability}%;background:var(--risky);"></div></div>
            </div>
            <div class="level-row">
              <div class="level-meta">
                <span>${normalize(copy.analysis.metrics.avgUnsafe)}</span>
                <span>${Math.round(group.averageUnsafe)}</span>
              </div>
              <div class="level-bar"><div class="level-fill" style="width:${group.averageUnsafe}%;background:var(--unsafe);"></div></div>
            </div>
            <div class="level-row">
              <div class="level-meta">
                <span>${normalize(copy.analysis.metrics.protectedShare)}</span>
                <span>${Math.round(group.protectedRatio)}%</span>
              </div>
              <div class="level-bar"><div class="level-fill" style="width:${group.protectedRatio}%;background:var(--critical);"></div></div>
            </div>
          </div>
          <div class="evidence-summary" style="margin-top:14px;">
            <div>
              <h5>${normalize(copy.analysis.metrics.riskShape)}</h5>
              <p>${normalize(naturalJoin(dominantDispositionLabels(group, 3)))}</p>
            </div>
            <div>
              <h5>${normalize(copy.analysis.metrics.characteristics)}</h5>
              <p>${normalize(describeTypeCharacteristics(group, copy))}</p>
            </div>
            <div>
              <h5>${normalize(copy.analysis.metrics.usageSignal)}</h5>
              <p>${normalize(describeTypeUsageSignal(group, copy))}</p>
            </div>
          </div>
        </div>
      `;
    }

    function activateTypeFilter(type, shouldScroll = false) {
      state.typeFilter = state.typeFilter === type ? "all" : type;
      const copy = currentCopy();
      renderOverview(copy);
      renderDataAnalysis(copy);
      renderSkillModules(copy);
      if (shouldScroll) {
        document.getElementById("skills").scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function bindTypeFilterTargets() {
      document.querySelectorAll("[data-type-filter]").forEach((node) => {
        const activate = () => activateTypeFilter(node.dataset.typeFilter, true);
        node.addEventListener("click", activate);
        node.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            activate();
          }
        });
      });
    }

    function renderDataAnalysis(copy) {
      document.getElementById("analysis-title").textContent = copy.analysis.title;
      document.getElementById("analysis-desc").textContent = copy.analysis.desc;
      document.getElementById("analysis-note").textContent = copy.analysis.note;
      const groups = buildAnalysisGroups();
      document.getElementById("analysis-chart-grid").innerHTML = [
        renderTypeDistributionChart(copy, groups),
        renderTypeRiskMixChart(copy, groups),
        renderTypeActivityChart(copy, groups)
      ].join("");
      document.getElementById("analysis-type-grid").innerHTML = groups.map((group) => renderAnalysisTypeCard(group, copy)).join("");
      bindTypeFilterTargets();
    }

    function renderDefinitionCards(copy) {
      document.getElementById("definition-grid").innerHTML = copy.definitions.cards.map(([title, desc]) => `
        <div class="metric-card">
          <h3>${normalize(title)}</h3>
          <p>${normalize(desc)}</p>
        </div>
      `).join("");
    }

    function renderThresholdChart(title, desc, levels) {
      return `
        <div class="chart-card">
          <h3>${normalize(title)}</h3>
          <p>${normalize(desc)}</p>
          <div class="levels">
            ${levels.map((level) => `
              <div class="level-row">
                <div class="level-meta">
                  <span>${normalize(level.label)}</span>
                  <span>${normalize(level.range)}</span>
                </div>
                <div class="level-bar">
                  <div class="level-fill" style="width:${level.percent}%;background:${level.color};"></div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderLadderChart(copy) {
      const ladder = dispositionOrder.map((key) => `
        <div class="step-item" data-step="${dispositionOrder.indexOf(key) + 1}">
          <strong style="color:${colorMap[key]};">${normalize(translate("disposition", key))}</strong>
          <span>${normalize(translate("action", key === "safe" ? "observe" : key === "risky" || key === "suspicious" ? "review" : key === "unsafe" ? "block" : "quarantine"))}</span>
        </div>
      `).join("");
      return `
        <div class="chart-card">
          <h3>${normalize(copy.definitions.charts.ladder)}</h3>
          <p>${normalize(copy.definitions.charts.ladderDesc)}</p>
          <div class="steps">${ladder}</div>
        </div>
      `;
    }

    function renderDefinitions(copy) {
      document.getElementById("definitions-title").textContent = copy.definitions.title;
      document.getElementById("definitions-desc").textContent = copy.definitions.desc;
      renderDefinitionCards(copy);

      const capabilityLevels = [
        { label: translate("capabilityLevel", "minimal"), range: "0", percent: 4, color: "var(--safe)" },
        { label: translate("capabilityLevel", "low"), range: "1-19", percent: 20, color: "var(--safe)" },
        { label: translate("capabilityLevel", "moderate"), range: "20-44", percent: 44, color: "var(--risky)" },
        { label: translate("capabilityLevel", "high"), range: "45-69", percent: 69, color: "var(--suspicious)" },
        { label: translate("capabilityLevel", "extreme"), range: "70-100", percent: 100, color: "var(--critical)" }
      ];
      const unsafeLevels = [
        { label: translate("unsafeLevel", "none"), range: "0", percent: 4, color: "var(--safe)" },
        { label: translate("unsafeLevel", "low"), range: "1-24", percent: 24, color: "var(--risky)" },
        { label: translate("unsafeLevel", "medium"), range: "25-54", percent: 54, color: "var(--suspicious)" },
        { label: translate("unsafeLevel", "high"), range: "55-79", percent: 79, color: "var(--unsafe)" },
        { label: translate("unsafeLevel", "critical"), range: "80-100", percent: 100, color: "var(--critical)" }
      ];

      const matrix = `
        <div class="chart-card">
          <h3>${normalize(copy.definitions.charts.ladder)}</h3>
          <p>${normalize(copy.definitions.charts.ladderDesc)}</p>
          <div class="matrix">
            <div class="matrix-cell">
              <strong>${normalize(translate("disposition", "safe"))}</strong>
              <span>${normalize(state.lang === "zh" ? "低能力面，低不安全证据。" : "Low capability surface and low unsafe evidence.")}</span>
            </div>
            <div class="matrix-cell">
              <strong>${normalize(translate("disposition", "risky"))}</strong>
              <span>${normalize(state.lang === "zh" ? "能力面较大，但尚无强恶意链路。" : "Broad capability surface without strong malicious chains.")}</span>
            </div>
            <div class="matrix-cell">
              <strong>${normalize(translate("disposition", "suspicious"))}</strong>
              <span>${normalize(state.lang === "zh" ? "已有部分危险信号，需要人工复核。" : "Partial dangerous signals. Manual review required.")}</span>
            </div>
            <div class="matrix-cell">
              <strong>${normalize(translate("disposition", "unsafe"))} / ${normalize(translate("disposition", "critical"))}</strong>
              <span>${normalize(state.lang === "zh" ? "证据足够强，默认阻止执行；严重时直接隔离。" : "Evidence is strong enough to block by default; quarantine when critical.")}</span>
            </div>
          </div>
        </div>
      `;

      document.getElementById("definitions-chart-grid").innerHTML = [
        renderThresholdChart(copy.definitions.charts.capability, copy.definitions.charts.capabilityDesc, capabilityLevels),
        renderThresholdChart(copy.definitions.charts.unsafe, copy.definitions.charts.unsafeDesc, unsafeLevels),
        matrix
      ].join("");
    }

    function renderGuideCard(card, copy) {
      if (card.type === "anatomy") {
        return `
          <div class="guide-card">
            <h3>${normalize(card.title)}</h3>
            <p>${normalize(card.desc)}</p>
            <div class="steps">
              <div class="step-item" data-step="1"><strong>${normalize(copy.skills.charts.score)}</strong><span>${normalize(copy.skills.charts.scoreDesc)}</span></div>
              <div class="step-item" data-step="2"><strong>${normalize(copy.skills.charts.severity)}</strong><span>${normalize(copy.skills.charts.severityDesc)}</span></div>
              <div class="step-item" data-step="3"><strong>${normalize(copy.skills.charts.capability)}</strong><span>${normalize(copy.skills.charts.capabilityDesc)}</span></div>
            </div>
          </div>
        `;
      }
      if (card.type === "flow") {
        return `
          <div class="guide-card">
            <h3>${normalize(card.title)}</h3>
            <p>${normalize(card.desc)}</p>
            <div class="steps">
              <div class="step-item" data-step="1"><strong>${normalize(state.lang === "zh" ? "先看结论标签" : "Read the disposition first")}</strong><span>${normalize(state.lang === "zh" ? "快速判断它属于安全、风险、可疑还是不安全。" : "Quickly decide whether the module is safe, risky, suspicious, unsafe, or critical.")}</span></div>
              <div class="step-item" data-step="2"><strong>${normalize(state.lang === "zh" ? "再看三张图" : "Then read the three charts")}</strong><span>${normalize(state.lang === "zh" ? "分别理解双分值、严重度分布和能力画像。" : "Use the charts to understand score contrast, severity mix, and capability profile.")}</span></div>
              <div class="step-item" data-step="3"><strong>${normalize(state.lang === "zh" ? "最后回到证据" : "Finish with evidence")}</strong><span>${normalize(state.lang === "zh" ? "根据路径、行号和判定理由，决定是否要继续人工审查。" : "Use the exact path, line, and rationale to decide whether deeper review is needed.")}</span></div>
            </div>
          </div>
        `;
      }
      return `
        <div class="guide-card">
          <h3>${normalize(card.title)}</h3>
          <p>${normalize(card.desc)}</p>
          <div class="steps">
            <div class="step-item" data-step="1"><strong>${normalize(translate("action", "observe"))}</strong><span>${normalize(state.lang === "zh" ? "保留观察，不影响正常使用。" : "Keep under observation without immediate intervention.")}</span></div>
            <div class="step-item" data-step="2"><strong>${normalize(translate("action", "review"))}</strong><span>${normalize(state.lang === "zh" ? "需要人工看代码或文档上下文。" : "Requires human verification of code or documentation context.")}</span></div>
            <div class="step-item" data-step="3"><strong>${normalize(translate("action", "block"))}</strong><span>${normalize(state.lang === "zh" ? "默认禁止执行，直到解释清楚。" : "Execution should remain blocked until clarified.")}</span></div>
            <div class="step-item" data-step="4"><strong>${normalize(translate("action", "quarantine"))}</strong><span>${normalize(state.lang === "zh" ? "从活动搜索路径中移除，并进行隔离审查。" : "Remove from active search paths and review in isolation.")}</span></div>
          </div>
        </div>
      `;
    }

    function renderGuide(copy) {
      document.getElementById("guide-title").textContent = copy.guide.title;
      document.getElementById("guide-desc").textContent = copy.guide.desc;
      document.getElementById("guide-grid").innerHTML = copy.guide.cards.map((card) => renderGuideCard(card, copy)).join("");
    }

    function buildSkillsDesc(copy) {
      if (state.typeFilter === "all") {
        return copy.skills.desc;
      }
      const typeLabel = translate("skillType", state.typeFilter);
      return state.lang === "zh"
        ? `${copy.skills.desc} 当前已按“${typeLabel}”筛选。再次点击同类型卡片或切回“${copy.analysis.all}”可恢复全量视图。`
        : `${copy.skills.desc} The module list is currently filtered to ${typeLabel}. Click the same type again or switch back to ${copy.analysis.all} to return to the full view.`;
    }

    function renderFilters(copy) {
      const filters = document.getElementById("filters");
      const buttons = [
        `<button class="filter-btn ${state.filter === "all" ? "is-active" : ""}" data-filter="all">${normalize(copy.skills.all)}</button>`
      ];
      buttons.push(...dispositionOrder.map((key) => `
        <button class="filter-btn ${state.filter === key ? "is-active" : ""}" data-filter="${key}">
          ${normalize(copy.skills.filters[key])}
        </button>
      `));
      filters.innerHTML = buttons.join("");
      filters.querySelectorAll("[data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          state.filter = button.dataset.filter;
          renderFilters(copy);
          renderSkillModules(copy);
        });
      });
    }

    function renderTypeFilters(copy) {
      const filters = document.getElementById("type-filters");
      const types = ["all", "control-plane", "external-integration", "local-operator", "instructional"];
      filters.innerHTML = types.map((type) => {
        const isActive = state.typeFilter === type;
        const label = type === "all" ? copy.analysis.all : translate("skillType", type);
        return `<button class="filter-btn ${isActive ? "is-active" : ""}" data-type-filter-button="${type}">${normalize(label)}</button>`;
      }).join("");
      filters.querySelectorAll("[data-type-filter-button]").forEach((button) => {
        button.addEventListener("click", () => {
          const next = button.dataset.typeFilterButton;
          state.typeFilter = next === "all" ? "all" : (state.typeFilter === next ? "all" : next);
          renderOverview(copy);
          renderDataAnalysis(copy);
          renderSkillModules(copy);
        });
      });
    }

    function renderQuickLinks(copy) {
      const focus = getFocusSkills();
      document.getElementById("quick-links").innerHTML = focus.length
        ? focus.map((skill) => {
            const index = payload.skills.indexOf(skill);
            return `<a class="quick-link" href="#${skillAnchor(index)}">${normalize(copy.skills.quickPrefix)} · ${normalize(skill.declared_name)}</a>`;
          }).join("")
        : "";
    }

    function renderDualScoreChart(skill, copy) {
      return `
        <div class="module-chart">
          <h4>${normalize(copy.skills.charts.score)}</h4>
          <p>${normalize(copy.skills.charts.scoreDesc)}</p>
          <div class="metric-bars">
            <div class="metric-bar-row">
              <div class="metric-bar-head">
                <span>${normalize(copy.definitions.cards[0][0])} · ${normalize(translate("capabilityLevel", skill.capability_risk_level))}</span>
                <span>${skill.capability_risk_score}</span>
              </div>
              <div class="metric-bar-track">
                <div class="metric-bar-fill" style="width:${skill.capability_risk_score}%;background:var(--risky);"></div>
              </div>
            </div>
            <div class="metric-bar-row">
              <div class="metric-bar-head">
                <span>${normalize(copy.definitions.cards[1][0])} · ${normalize(translate("unsafeLevel", skill.unsafe_behavior_level))}</span>
                <span>${skill.unsafe_behavior_score}</span>
              </div>
              <div class="metric-bar-track">
                <div class="metric-bar-fill" style="width:${skill.unsafe_behavior_score}%;background:${colorMap[skill.disposition]};"></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderSeverityChart(skill, copy) {
      const counts = severityCounts(skill);
      const total = Object.values(counts).reduce((sum, value) => sum + value, 0);
      if (!total) {
        return `
          <div class="module-chart">
            <h4>${normalize(copy.skills.charts.severity)}</h4>
            <p>${normalize(copy.skills.charts.severityDesc)}</p>
            <div class="empty-state">${normalize(copy.skills.emptyFindings)}</div>
          </div>
        `;
      }
      const segments = ["critical", "high", "medium", "low"].map((key) => {
        const width = (counts[key] / total) * 100;
        return `<span class="stack-segment" style="width:${width}%;background:${key === "critical" ? "var(--critical)" : key === "high" ? "var(--unsafe)" : key === "medium" ? "var(--suspicious)" : "var(--risky)"};"></span>`;
      }).join("");
      const legend = ["critical", "high", "medium", "low"].map((key) => `
        <div class="severity-row">
          <span><span class="dot" style="background:${key === "critical" ? "var(--critical)" : key === "high" ? "var(--unsafe)" : key === "medium" ? "var(--suspicious)" : "var(--risky)"};"></span>${normalize(translate("severity", key))}</span>
          <strong>${counts[key]}</strong>
        </div>
      `).join("");
      return `
        <div class="module-chart">
          <h4>${normalize(copy.skills.charts.severity)}</h4>
          <p>${normalize(copy.skills.charts.severityDesc)}</p>
          <div class="severity-stack">
            <div class="stack-track">${segments}</div>
            <div class="severity-legend">${legend}</div>
          </div>
        </div>
      `;
    }

    function renderCapabilityChart(skill, copy) {
      const items = (skill.top_capabilities || []).slice(0, 4);
      if (!items.length) {
        return `
          <div class="module-chart">
            <h4>${normalize(copy.skills.charts.capability)}</h4>
            <p>${normalize(copy.skills.charts.capabilityDesc)}</p>
            <div class="empty-state">${normalize(copy.skills.emptyCapabilities)}</div>
          </div>
        `;
      }
      const maxWeight = Math.max(...items.map((item) => item.weight || 0), 1);
      return `
        <div class="module-chart">
          <h4>${normalize(copy.skills.charts.capability)}</h4>
          <p>${normalize(copy.skills.charts.capabilityDesc)}</p>
          <div class="bars">
            ${items.map((item) => `
              <div class="bar-row">
                <div class="bar-head">
                  <span>${normalize(translate("category", item.category))}</span>
                  <span>${item.count} ${normalize(copy.terms.hits)}</span>
                </div>
                <div class="mini-bar-track">
                  <div class="mini-bar-fill" style="width:${Math.max(18, ((item.weight || 0) / maxWeight) * 100)}%;background:var(--risky);"></div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderFindingsPanel(skill, copy) {
      const findings = (skill.findings || []).slice(0, 5);
      const assessment = buildFindingsAssessment(skill);
      if (!findings.length) {
        return `
          <div class="evidence-panel">
            <h4>${normalize(copy.skills.panels.findings)}</h4>
            <div class="empty-state">${normalize(copy.skills.emptyFindings)}</div>
            ${renderPanelSummary(copy, assessment.summary, assessment.recommendation)}
          </div>
        `;
      }
      return `
        <div class="evidence-panel">
          <h4>${normalize(copy.skills.panels.findings)}</h4>
          <div class="evidence-list">
            ${findings.map((finding) => `
              <div class="evidence-item">
                <strong>
                  <span style="color:${finding.severity === "critical" ? "var(--critical)" : finding.severity === "high" ? "var(--unsafe)" : finding.severity === "medium" ? "var(--suspicious)" : "var(--risky)"};">
                    ${normalize(translate("severity", finding.severity))}
                  </span>
                  · ${normalize(translate("category", finding.category))}
                </strong>
                <small>${normalize(finding.path)}${finding.line ? `:${finding.line}` : ""}</small>
                <small>${normalize(finding.message)}</small>
                <small>${normalize(copy.terms.rationale)}: ${normalize(finding.rationale)}</small>
                ${finding.source_kind ? `<small>${normalize(copy.terms.sourceContext)}: ${normalize(translate("sourceKind", finding.source_kind))}</small>` : ""}
                ${finding.chain_confidence ? `<small>${normalize(copy.terms.chainConfidence)}: ${normalize(translate("chainConfidence", finding.chain_confidence))}</small>` : ""}
                ${finding.evidence_kind ? `<small>${normalize(copy.terms.evidenceType)}: ${normalize(translate("evidenceKind", finding.evidence_kind))}</small>` : ""}
                ${finding.evidence_confidence ? `<small>${normalize(copy.terms.evidenceConfidence)}: ${normalize(translate("evidenceConfidence", finding.evidence_confidence))}</small>` : ""}
                ${finding.protected_surface ? `<small>${normalize(copy.terms.protectedSurface)}: ${normalize(translate("protectedSurface", finding.protected_surface))}</small>` : ""}
                ${finding.related_evidence ? finding.related_evidence.slice(0, 3).map((item) => `
                  <small>${normalize(copy.terms.path)}: ${normalize(item.path || "")}${item.line ? `:${item.line}` : ""}${item.symbol ? ` · ${normalize(item.symbol)}` : ""}</small>
                `).join("") : ""}
                ${(finding.baseline_reviews || []).map((review) => `
                  <small>${normalize(copy.terms.baselineReview)}: ${normalize(translate("baselineStatus", review.status))}${review.reason ? ` · ${normalize(review.reason)}` : ""}</small>
                `).join("")}
              </div>
            `).join("")}
          </div>
          ${renderPanelSummary(copy, assessment.summary, assessment.recommendation)}
        </div>
      `;
    }

    function renderCapabilitiesPanel(skill, copy) {
      const items = (skill.top_capabilities || []).slice(0, 5);
      const assessment = buildCapabilityAssessment(skill);
      if (!items.length) {
        return `
          <div class="evidence-panel">
            <h4>${normalize(copy.skills.panels.capabilities)}</h4>
            <div class="empty-state">${normalize(copy.skills.emptyCapabilities)}</div>
            ${renderPanelSummary(copy, assessment.summary, assessment.recommendation)}
          </div>
        `;
      }
      return `
        <div class="evidence-panel">
          <h4>${normalize(copy.skills.panels.capabilities)}</h4>
          <div class="evidence-list">
            ${items.map((item) => `
              <div class="evidence-item">
                <strong>${normalize(translate("category", item.category))}</strong>
                <small>${normalize(item.evidence.path)}${item.evidence.line ? `:${item.evidence.line}` : ""}</small>
                <small>${normalize(item.evidence.excerpt || "")}</small>
                ${item.evidence.protected_surface ? `<small>${normalize(copy.terms.protectedSurface)}: ${normalize(translate("protectedSurface", item.evidence.protected_surface))}</small>` : ""}
                <small>${item.count} ${normalize(copy.terms.hits)}</small>
              </div>
            `).join("")}
          </div>
          ${renderPanelSummary(copy, assessment.summary, assessment.recommendation)}
        </div>
      `;
    }

    function renderSkillCard(skill, index, copy) {
      const resources = (skill.resource_dirs || []).length ? skill.resource_dirs.join(", ") : copy.skills.fields.none;
      return `
        <article class="module-card" id="${skillAnchor(index)}">
          <div class="module-top">
            <div>
              <h3 class="module-title">${normalize(skill.declared_name)}</h3>
              <p class="module-subtitle">${normalize(skill.purpose_summary)}</p>
              <p class="module-path">${normalize(copy.terms.path)} · ${normalize(skill.path)}</p>
            </div>
            <div class="badge-row">
              <span class="badge status-${skill.disposition}">${normalize(translate("disposition", skill.disposition))}</span>
              <span class="badge">${normalize(translate("action", skill.recommended_action))}</span>
              <span class="badge">${normalize(copy.terms.findingCount)} · ${skill.finding_count}</span>
            </div>
          </div>

          <div class="module-meta">
            <div class="meta-card">
              <label>${normalize(copy.skills.fields.targetType)}</label>
              <strong>${normalize(translate("targetKind", skill.target_kind || "skill"))}</strong>
            </div>
            <div class="meta-card">
              <label>${normalize(copy.skills.fields.purpose)}</label>
              <strong>${normalize(skill.purpose_summary)}</strong>
            </div>
            <div class="meta-card">
              <label>${normalize(copy.skills.fields.fileCount)}</label>
              <strong>${normalize(String(skill.file_count))}</strong>
            </div>
            <div class="meta-card">
              <label>${normalize(copy.skills.fields.resources)}</label>
              <strong>${normalize(resources)}</strong>
            </div>
            <div class="meta-card">
              <label>${normalize(copy.skills.fields.scanMode)}</label>
              <strong>${normalize(translate("scanMode", skill.scan_mode || "fresh"))}</strong>
            </div>
            <div class="meta-card">
              <label>${normalize(copy.skills.fields.protectedCount)}</label>
              <strong>${normalize(String(skill.protected_surface_count || 0))}</strong>
            </div>
          </div>

          <div class="module-chart-grid">
            ${renderDualScoreChart(skill, copy)}
            ${renderSeverityChart(skill, copy)}
            ${renderCapabilityChart(skill, copy)}
          </div>

          ${renderAuditOpinionCard(skill, copy)}

          <div class="module-bottom">
            ${renderFindingsPanel(skill, copy)}
            ${renderCapabilitiesPanel(skill, copy)}
          </div>
          <div class="chart-legend" style="margin-top:14px;">
            <span class="legend-chip">${normalize(copy.terms.diffSummary)} · ${normalize(String((skill.diff_summary && skill.diff_summary.changed_count) || 0))}/${normalize(String((skill.diff_summary && skill.diff_summary.added_count) || 0))}/${normalize(String((skill.diff_summary && skill.diff_summary.removed_count) || 0))}</span>
          </div>
        </article>
      `;
    }

    function renderSkillModules(copy) {
      document.getElementById("skills-title").textContent = copy.skills.title;
      document.getElementById("skills-desc").textContent = buildSkillsDesc(copy);
      renderFilters(copy);
      renderTypeFilters(copy);
      renderQuickLinks(copy);
      const filtered = getFilteredSkills();
      const grid = document.getElementById("module-grid");
      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state">${normalize(copy.skills.empty)}</div>`;
        return;
      }
      grid.innerHTML = filtered.map((skill) => {
        const index = payload.skills.indexOf(skill);
        return renderSkillCard(skill, index, copy);
      }).join("");
    }

    function renderPage() {
      const copy = currentCopy();
      renderMenu(copy);
      renderHero(copy);
      renderOverview(copy);
      renderDataAnalysis(copy);
      renderDefinitions(copy);
      renderGuide(copy);
      renderSkillModules(copy);
      renderFooter(copy);
      bindNavObserver();
    }

    function bindNavObserver() {
      const links = document.querySelectorAll(".menu-link");
      links.forEach((link) => link.classList.remove("is-current"));
      const sections = sectionIds.map((id) => document.getElementById(id)).filter(Boolean);
      if (!("IntersectionObserver" in window)) {
        return;
      }
      if (window.__skillDoctorObserver) {
        window.__skillDoctorObserver.disconnect();
      }
      const observer = new IntersectionObserver((entries) => {
        const visible = entries
          .filter((entry) => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) {
          return;
        }
        links.forEach((link) => {
          link.classList.toggle("is-current", link.dataset.section === visible.target.id);
        });
      }, {
        rootMargin: "-20% 0px -65% 0px",
        threshold: [0.1, 0.3, 0.6]
      });
      sections.forEach((section) => observer.observe(section));
      window.__skillDoctorObserver = observer;
    }

    document.getElementById("lang-toggle").addEventListener("click", () => {
      state.lang = state.lang === "zh" ? "en" : "zh";
      localStorage.setItem("skillDoctorLang", state.lang);
      renderPage();
    });

    renderPage();
  </script>
</body>
</html>
